<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Espacios Públicos · Intendencia Departamental de Rocha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {
    menu.classList.toggle("active");
    toggle.classList.toggle("active");
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.getElementById("menu-toggle");
    const menu = document.getElementById("menu");

    if (toggle && menu) {
        toggle.addEventListener("click", () => {
            menu.classList.toggle("active");
            toggle.classList.toggle("active");
        });
    }
});
</script>

<body>

<!-- ===== NAVBAR ===== -->
<header class="top-navbar">

    <div class="logo">
        <img src="assets/img/Logo.png" alt="Logo">
    </div>

    <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="menu" id="menu">
        <ul>
             <li><a href="index.html">🏠 Inicio</a></li>

            <li><a href="NuestroTrabajo.html"><span>📊 Trabajo</span></a></li>
            <li><a href="SolisitudesReclamos.html"><span>📩 Reclamos</span></a></li>
        </ul>
    </nav>

</header>

<!-- ===== CONTENIDO ===== -->
<section class="formulario-reclamos">

    <h1>Realizar un Reclamo</h1>

    <p class="descripcion">
        Complete el siguiente formulario para registrar su reclamo.
        Es obligatorio adjuntar una imagen para su correcta evaluación.
    </p>

    <!-- FORMULARIO GOOGLE -->
    <iframe 
        src="https://docs.google.com/forms/d/e/TU_FORMULARIO/viewform?embedded=true" 
        width="100%" 
        height="900" 
        frameborder="0">
    </iframe>

</section>

<!-- ===== FOOTER ===== -->
<footer>
    <h3>Contacto</h3>
    <p>📍 Dirección</p>
    <p>📞 Teléfono</p>
    <p>📧 Email</p>
</footer>

<!-- ===== JS MENU ===== -->
<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {
    toggle.classList.toggle("active");
    menu.classList.toggle("active");
});

document.querySelectorAll(".dropdown > a").forEach(item => {
    item.addEventListener("click", function(e) {
        if (window.innerWidth <= 768) {
            e.preventDefault();
            this.parentElement.classList.toggle("active");
        }
    });
});
</script>

</body>
</html>
