<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Espacios Públicos · Intendencia Departamental de Rocha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {
    menu.classList.toggle("active");
    toggle.classList.toggle("active");
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.getElementById("menu-toggle");
    const menu = document.getElementById("menu");

    if (toggle && menu) {
        toggle.addEventListener("click", () => {
            menu.classList.toggle("active");
            toggle.classList.toggle("active");
        });
    }
});
</script>

<body>

<!-- ===== NAVBAR NUEVO ===== -->
<header class="top-navbar">

    <!-- LOGO -->
    <div class="logo">
        <img src="assets/img/Logo.png" alt="Logo">
    </div>

    <!-- BOTÓN MOBILE -->
    <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- MENÚ -->
    <nav class="menu" id="menu">
        <ul>

           <li><a href="index.html">🏠 Inicio</a></li>

            <li><a href="NuestroTrabajo.html"><span>📊 Trabajo</span></a></li>
            <li><a href="SolisitudesReclamos.html"><span>📩 Reclamos</span></a></li>

        </ul>
    </nav>

</header>

<!-- ===== ESPACIO ===== -->
<div style="height: 20px;"></div>

<!-- ===== GALERÍA ===== -->
<section class="dashboard">

    <h2 class="dashboard-title">Panel de Control</h2>

    <div class="dashboard-grid">

        <a href="HacarReclamo.html" class="dashboard-card">
            <img src="assets/img/Reclamo.png" alt="Reclamos">
            <h3>Reclamos</h3>
            <p>Registrar y gestionar reclamos</p>
        </a>

        <a href="poda.html" class="dashboard-card">
            <img src="assets/img/ReclamoPoda.png" alt="Podas">
            <h3>Podas</h3>
            <p>Solicitudes de poda de árboles</p>
        </a>

        <a href="picudo.html" class="dashboard-card">
            <img src="assets/img/ReclamoPicudo.png" alt="Palmeras">
            <h3>Palmeras</h3>
            <p>Control sanitario y monitoreo</p>
        </a>

    </div>

</section>

<!-- ===== FOOTER ===== -->
<footer>
    <h3>Contacto</h3>
    <p>📍 Dirección</p>
    <p>📞 Teléfono</p>
    <p>📧 Email</p>
    <p>🕒 Horario</p>
</footer>

<!-- ===== JS MENU MOBILE ===== -->
<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {
    toggle.classList.toggle("active");
    menu.classList.toggle("active");
});

// Dropdown mobile
document.querySelectorAll(".dropdown > a").forEach(item => {
    item.addEventListener("click", function(e) {
        if (window.innerWidth <= 768) {
            e.preventDefault();
            this.parentElement.classList.toggle("active");
        }
    });
});
</script>

</body>
</html>
